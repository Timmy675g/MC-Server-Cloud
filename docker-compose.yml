services:
  mc:
    image: itzg/minecraft-server
    stop_grace_period: 1m
    container_name: mc-server-docker
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"     # Java
      - "19132:19132/udp" # Bedrock
      - "8804:8804"   # Plan
      - "8888:8000"   # PlaceholderWeb API
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/server.jar"
      MEMORY: "12G"
    volumes:
      - ./data:/data
    restart: always
